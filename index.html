<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Repuestos: Siam Nomad 150</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: "Inter", sans-serif; }
        .category-btn.active { background-color: #0284c7; color: white; border-color: #0284c7; }
        .part-card { transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out; }
        .part-card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
</head>

<body class="bg-slate-100 text-slate-800">
    <div class="container mx-auto p-4 sm:p-6 lg:p-8">
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-slate-900">Repuestos: Siam Nomad 150</h1>
        </header>

        <main>
            <div class="py-4 mb-6">
                <div class="flex flex-col md:flex-row gap-4">
                    <div class="relative flex-grow">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        </span>
                        <input type="text" id="search-input" placeholder="Buscar por nombre o compatibilidad..." class="w-full pl-10 pr-4 py-3 border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-sky-500" />
                    </div>
                </div>
                <div id="category-filters" class="mt-4 flex flex-wrap gap-2 justify-center"></div>
            </div>
            <div id="parts-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
        </main>
    </div>

    <script>
        // TU URL ACTUALIZADA
        const API_URL = "https://script.google.com/macros/s/AKfycbzdBMEG64Wff1euo01ojDNMmxa0Rd3gHMzVImMIzUBPCDUQIeCt8KB5x2rpchY4b4QmNQ/exec";
        
        let partsData = [];
        let activeCategory = "Todos";

        const partsGrid = document.getElementById("parts-grid");
        const searchInput = document.getElementById("search-input");
        const categoryFiltersContainer = document.getElementById("category-filters");

        async function loadData() {
            partsGrid.innerHTML = `<p class="col-span-full text-center py-10 text-slate-500">Cargando repuestos desde la base de datos...</p>`;
            try {
                const response = await fetch(API_URL, { redirect: 'follow' });
                partsData = await response.json();
                renderAll();
            } catch (error) {
                console.error("Error:", error);
                partsGrid.innerHTML = `<p class="col-span-full text-center text-red-500">Error al cargar datos. Reintenta en unos segundos.</p>`;
            }
        }

        function renderAll() {
            createCategoryFilters();
            filterAndRender();
        }

        function renderParts(filteredParts) {
            partsGrid.innerHTML = "";
            if (filteredParts.length === 0) {
                partsGrid.innerHTML = `<div class="col-span-full text-center py-10"><p class="text-slate-500">No se encontraron coincidencias.</p></div>`;
                return;
            }
            filteredParts.forEach((part) => {
                const partCard = document.createElement("div");
                partCard.className = "part-card bg-white rounded-xl shadow-md p-5 flex flex-col";
                partCard.innerHTML = `
                    <span class="text-xs font-semibold text-sky-600 bg-sky-100 px-2 py-1 rounded-full self-start">${part.category}</span>
                    <h3 class="font-bold text-xl text-slate-900 mt-3">${part.name}</h3>
                    <p class="text-slate-600 mt-2 flex-grow">${part.description}</p>
                `;
                partsGrid.appendChild(partCard);
            });
        }

        function filterAndRender() {
            let filtered = partsData;
            if (activeCategory !== "Todos") {
                filtered = filtered.filter(p => p.category === activeCategory);
            }
            const term = searchInput.value.toLowerCase().trim();
            if (term) {
                filtered = filtered.filter(p => 
                    p.name.toLowerCase().includes(term) || 
                    p.description.toLowerCase().includes(term)
                );
            }
            renderParts(filtered);
        }

        function createCategoryFilters() {
            categoryFiltersContainer.innerHTML = "";
            const categories = ["Todos", ...new Set(partsData.map(p => p.category))];
            categories.forEach(cat => {
                const btn = document.createElement("button");
                btn.textContent = cat;
                btn.className = `category-btn px-4 py-2 text-sm font-semibold border rounded-lg transition-colors ${cat === activeCategory ? 'active' : ''}`;
                btn.onclick = () => {
                    activeCategory = cat;
                    document.querySelectorAll(".category-btn").forEach(b => b.classList.remove("active"));
                    btn.classList.add("active");
                    filterAndRender();
                };
                categoryFiltersContainer.appendChild(btn);
            });
        }

        searchInput.oninput = filterAndRender;
        window.onload = loadData;
    </script>
</body>
