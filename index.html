<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Repuestos: Siam Nomad 150</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: "Inter", sans-serif;
        }

        #parts-grid {
            transition: opacity 0.5s ease-in-out;
        }

        .category-btn.active {
            background-color: #0284c7;
            /* bg-sky-600 */
            color: white;
            border-color: #0284c7;
            /* bg-sky-600 */
        }

        .part-card {
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }

        .part-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1),
                0 4px 6px -4px rgb(0 0 0 / 0.1);
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
</head>

<body class="bg-slate-100 text-slate-800">
    <div class="container mx-auto p-4 sm:p-6 lg:p-8">
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-slate-900">
                Repuestos: Siam Nomad 150
            </h1>
        </header>

        <main>
            <div class="py-4 mb-6">
                <div class="flex flex-col md:flex-row gap-4">
                    <div class="relative flex-grow">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                        </span>
                        <input type="text" id="search-input" placeholder="Buscar por nombre o compatibilidad..."
                            class="w-full pl-10 pr-4 py-3 border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-sky-500" />
                    </div>
                </div>
                <div id="category-filters" class="mt-4 flex flex-wrap gap-2 justify-center"></div>
            </div>

            <div id="parts-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
        </main>
    </div>

    <script>
        async function loadData() {
    partsGrid.innerHTML = `<p class="col-span-full text-center py-10 text-slate-500">Conectando con la base de datos...</p>`;
    
    try {
        // Añadimos redirect: "follow" para que siga la redirección de Google
        const response = await fetch(API_URL, {
            method: 'GET',
            mode: 'cors',
            redirect: 'follow'
        });

        if (!response.ok) throw new Error('Error en red');
        
        partsData = await response.json();
        
        categoryFiltersContainer.innerHTML = "";
        createCategoryFilters();
        renderParts(partsData);
    } catch (error) {
        console.error("Error detallado:", error);
        partsGrid.innerHTML = `
            <div class="col-span-full text-center py-10">
                <p class="text-red-500 font-bold">Error al conectar con la base de datos.</p>
                <p class="text-sm text-slate-400">Verifica que el Apps Script esté como "Acceso: Cualquiera".</p>
                <button onclick="loadData()" class="mt-4 px-4 py-2 bg-sky-600 text-white rounded-lg">Reintentar</button>
            </div>`;
    }
}

    </script>
</body>
