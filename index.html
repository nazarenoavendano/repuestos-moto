<body class="bg-slate-100 text-slate-800">
    <div class="container mx-auto p-4 sm:p-6 lg:p-8">
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-slate-900">
                Repuestos: Siam Nomad 150
            </h1>
        </header>

        <main>
            <div class="py-4 mb-6">
                <div class="flex flex-col md:flex-row gap-4">
                    <div class="relative flex-grow">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                        </span>
                        <input type="text" id="search-input" placeholder="Buscar por nombre o compatibilidad..."

                    </div>
                </div>
                <div id="category-filters" class="mt-4 flex flex-wrap gap-2 justify-center"></div>
            </div>

            <div id="parts-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
        </main>
    </div>

    <script>

            // 1. Reemplaza la URL con la que copiaste de Google Apps Script
    const API_URL = "https://script.google.com/macros/s/AKfycbwP4fdr2vxjRIEfh_hLh7G5h_1dA0EFQ8VbbXnildVQk1M1IdLP2HsOJv_Ei-4-7G1OYQ/exec";

    let partsData = []; // Ahora empieza vacío
    let activeCategory = "Todos";

    const partsGrid = document.getElementById("parts-grid");
    const searchInput = document.getElementById("search-input");
    const categoryFiltersContainer = document.getElementById("category-filters");

    // 2. Función nueva para traer los datos
    async function loadData() {
        try {
            const response = await fetch(API_URL);
            partsData = await response.json();
            
            // Una vez que tenemos los datos, ejecutamos lo que antes se hacía al cargar
            createCategoryFilters();
            renderParts(partsData);
        } catch (error) {
            console.error("Error cargando repuestos:", error);
            partsGrid.innerHTML = `<p class="text-center col-span-full">Error al conectar con la base de datos.</p>`;
        }
    }

    // ... (Manten tus funciones renderParts, filterAndRender y createCategoryFilters igual) ...

    // 3. Cambiamos el inicio
    document.addEventListener("DOMContentLoaded", () => {
        loadData(); // En lugar de renderizar directo, llamamos a la función que descarga los datos
    });

    </script>
</body>
