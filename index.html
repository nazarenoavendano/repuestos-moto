            /* bg-sky-600 */

        .part-card {
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }

        .part-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1),
                0 4px 6px -4px rgb(0 0 0 / 0.1);
        }
    </style>

            },

                description: "Compatibles con Haojue NK 150.",
            },
        ];
        const partsGrid = document.getElementById("parts-grid");
        const searchInput = document.getElementById("search-input");
        const categoryFiltersContainer =
            document.getElementById("category-filters");

        let activeCategory = "Todos";

        function renderParts(filteredParts) {
            partsGrid.innerHTML = "";
            if (filteredParts.length === 0) {
                partsGrid.innerHTML = `<div class="col-span-full text-center py-10">
                    <p class="text-slate-500 text-lg">No se encontraron repuestos que coincidan con la búsqueda.</p>
                </div>`;
                return;
            }
            filteredParts.forEach((part) => {
                const partCard = document.createElement("div");
                partCard.className =
                    "part-card bg-white rounded-xl shadow-md p-5 flex flex-col";
                partCard.innerHTML = `
                    <span class="text-xs font-semibold text-sky-600 bg-sky-100 px-2 py-1 rounded-full self-start">${part.category}</span>
                    <h3 class="font-bold text-xl text-slate-900 mt-3">${part.name}</h3>
                    <p class="text-slate-600 mt-2 flex-grow">${part.description}</p>
                `;
                partsGrid.appendChild(partCard);
            });
        }

        function filterAndRender() {
            let filtered = partsData;

            if (activeCategory !== "Todos") {
                filtered = filtered.filter((part) => part.category === activeCategory);
            }

            const searchTerm = searchInput.value.toLowerCase().trim();
            if (searchTerm) {
                filtered = filtered.filter(
                    (part) =>
                        part.name.toLowerCase().includes(searchTerm) ||
                        part.description.toLowerCase().includes(searchTerm) ||
                        part.category.toLowerCase().includes(searchTerm)
                );
            }

            renderParts(filtered);
        }

        function createCategoryFilters() {
            const categories = [
                "Todos",
                ...new Set(partsData.map((p) => p.category)),
            ];

            categories.forEach((category) => {
                const button = document.createElement("button");
                button.textContent = category;
                button.className =
                    "category-btn px-4 py-2 text-sm font-semibold border rounded-lg transition-colors duration-200";
                if (category === "Todos") {
                    button.classList.add("active");
                }

                button.addEventListener("click", () => {
                    activeCategory = category;
                    document
                        .querySelectorAll(".category-btn")
                        .forEach((btn) => btn.classList.remove("active"));
                    button.classList.add("active");
                    filterAndRender();
                });

                categoryFiltersContainer.appendChild(button);
            });
        }

        searchInput.addEventListener("input", filterAndRender);

        document.addEventListener("DOMContentLoaded", () => {
            createCategoryFilters();
            renderParts(partsData);
        });
